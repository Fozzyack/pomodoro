{{ define "index" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="A clean, distraction-free Pomodoro timer for focused work sessions with editable durations and automatic cooldown mode.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Fozzyack">
    <meta name="theme-color" content="#ECEDDF">
    <link rel="canonical" href="/">

    <title>{{block "title" . }}Pomodoro Timer{{end}}</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Pomodoro Timer">
    <meta property="og:description"
        content="A clean, distraction-free Pomodoro timer for focused work sessions with editable durations and automatic cooldown mode.">
    <meta property="og:url" content="/">
    <meta property="og:image" content="/screenshot.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pomodoro Timer">
    <meta name="twitter:description"
        content="A clean, distraction-free Pomodoro timer for focused work sessions with editable durations and automatic cooldown mode.">
    <meta name="twitter:image" content="/screenshot.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Outfit:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link href="/assets/css/output.css" rel="stylesheet">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Pomodoro Timer",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Any",
      "description": "A clean, distraction-free Pomodoro timer for focused work sessions with editable durations and automatic cooldown mode.",
      "url": "/"
    }
    </script>
</head>

<body class="bg-[#ECEDDF]">
    {{ template "content" . }}
</body>

</html>
{{ end }}
